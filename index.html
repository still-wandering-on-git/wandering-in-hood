<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wandering in Hood</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background -->
    <div class="grid"></div>

    <div class="glow"></div>

    <!-- Main Container -->
    <main class="container">

        <!-- Logo -->
        <img
            src="assets/raccoon.png"
            alt="Wandering in Hood"
            class="logo">

        <!-- Title -->
        <h1>Wandering in Hood</h1>

        <p class="subtitle">
            still wandering
        </p>

        <!-- CTA -->
        <button id="findBtn">
            Find Home
        </button>

        <!-- Contract -->
        <section class="contract">

            <div class="ca-box">

                <span id="ca">
                    0xc37d66458c9ddeabad4976f077e98b176cb211c0
                </span>

                <button
                    class="copy-btn"
                    onclick="copyCA()">

                    COPY

                </button>

            </div>

        </section>

        <!-- Social -->
        <section class="socials">

            <a
                href="https://x.com/WanderinH00d"
                target="_blank"
                class="social-btn">

                <span class="icon">𝕏</span>

                <span>Twitter</span>

            </a>

            <a
                href="https://dexscreener.com/robinhood/0x851ae649fcf8ebf4eba4d630d77dce7e1a33e43d"
                target="_blank"
                class="social-btn">

                <span class="icon">📈</span>

                <span>DexScreener</span>

            </a>

        </section>

        <!-- Footer -->

        <footer>

            <p class="footer">

                No roadmap.<br>

                We're literally lost.

            </p>

        </footer>

    </main>

    <!-- Popup -->

    <div id="popup" class="popup">

        <div class="popup-card">

            <div class="popup-icon">

                🧭

            </div>

            <h2>

                404

            </h2>

            <p>

                GPS disconnected.

                <br><br>

                Current location:

                <br>

                <strong>Another L2.</strong>

                <br><br>

                Home not found.

            </p>

            <button
                class="popup-btn"
                onclick="closePopup()">

                Keep Wandering

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
