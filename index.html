<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wandering in Hood</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background -->
    <div class="grid"></div>

    <div class="glow"></div>

    <!-- Main Container -->
    <main class="container">

        <!-- Logo -->
        <img
            src="assets/raccoon.png"
            alt="Wandering in Hood"
            class="logo">

        <!-- Title -->
        <h1>Wandering in Hood</h1>

        <p class="subtitle">
            still wandering
        </p>

        <!-- CTA -->
        <button id="findBtn">
            Find Home
        </button>

        <!-- Contract -->
        <section class="contract">

            <div class="ca-box">

                <span id="ca">
                    0xComingSoon
                </span>

                <button
                    class="copy-btn"
                    onclick="copyCA()">

                    COPY

                </button>

            </div>

        </section>

        <!-- Social -->
        <section class="socials">

            <a
                href="https://x.com/WanderinH00d"
                target="_blank"
                class="social-btn">

                <span class="icon">𝕏</span>

                <span>Twitter</span>

            </a>

            <a
                href="https://dexscreener.com/"
                target="_blank"
                class="social-btn">

                <span class="icon">📈</span>

                <span>DexScreener</span>

            </a>

        </section>

        <!-- Footer -->

        <footer>

            <p class="footer">

                No roadmap.<br>

                We're literally lost.

            </p>

        </footer>

    </main>

    <!-- Popup -->

    <div id="popup" class="popup">

        <div class="popup-card">

            <div class="popup-icon">

                🧭

            </div>

            <h2>

                404

            </h2>

            <p>

                GPS disconnected.

                <br><br>

                Current location:

                <br>

                <strong>Another L2.</strong>

                <br><br>

                Home not found.

            </p>

            <button
                class="popup-btn"
                onclick="closePopup()">

                Keep Wandering

            </button>

        </div>

    </div>

    <script src="script.js"></script>

    <script>
        // Firefly Generator
        function createFireflies() {
            const container = document.getElementById('fireflies');
            for (let i = 0; i < 35; i++) {
                const fly = document.createElement('div');
                fly.className = 'firefly';
                
                const left = Math.random() * 100;
                const duration = 6 + Math.random() * 12;
                const delay = Math.random() * -15;
                
                fly.style.left = `${left}vw`;
                fly.style.top = `${Math.random() * 100}vh`;
                fly.style.animationDuration = `${duration}s`;
                fly.style.animationDelay = `${delay}s`;
                fly.style.setProperty('--x', `${(Math.random() - 0.5) * 800}px`);
                fly.style.setProperty('--y', `${(Math.random() - 0.5) * 600}px`);
                
                container.appendChild(fly);
            }
        }

        window.onload = createFireflies;
    </script>
</body>
</html>
